<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F7F0"/>
      <stop offset="100%" stop-color="#D4ECD4"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#787878"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="truckBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#237227"/>
      <stop offset="100%" stop-color="#1A5C1E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Hills -->
  <ellipse cx="200" cy="520" rx="350" ry="120" fill="#519A66" opacity="0.15"/>
  <ellipse cx="650" cy="540" rx="300" ry="100" fill="#237227" opacity="0.1"/>

  <!-- Road -->
  <path d="M0 480 Q200 460 400 470 Q600 480 800 465 L800 520 Q600 530 400 520 Q200 510 0 525Z" fill="url(#road)" opacity="0.2"/>
  <!-- Road dashes -->
  <rect x="80" y="492" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>
  <rect x="200" y="488" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>
  <rect x="320" y="490" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>
  <rect x="440" y="494" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>
  <rect x="560" y="490" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>
  <rect x="680" y="486" width="60" height="4" rx="2" fill="#FFAA00" opacity="0.6"/>

  <!-- Delivery Truck -->
  <g transform="translate(280, 380)">
    <!-- Truck cargo -->
    <rect x="0" y="-80" width="180" height="100" rx="12" fill="url(#truckBody)"/>
    <!-- Cargo door lines -->
    <line x1="90" y1="-75" x2="90" y2="15" stroke="#1A5C1E" stroke-width="2"/>
    <rect x="82" y="-40" width="16" height="8" rx="4" fill="#FFAA00"/>
    <!-- Nexus logo on truck -->
    <rect x="20" y="-60" width="50" height="30" rx="6" fill="#FFAA00"/>
    <text x="45" y="-39" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#237227">NX</text>
    <!-- Cabin -->
    <rect x="180" y="-55" width="70" height="75" rx="10" fill="#237227"/>
    <!-- Windshield -->
    <rect x="190" y="-45" width="50" height="35" rx="6" fill="#D4ECD4"/>
    <rect x="190" y="-45" width="50" height="35" rx="6" fill="white" opacity="0.5"/>
    <!-- Bumper -->
    <rect x="245" y="-10" width="15" height="30" rx="4" fill="#1A5C1E"/>
    <!-- Headlight -->
    <rect x="248" y="0" width="10" height="8" rx="3" fill="#FFAA00"/>
    <!-- Wheels -->
    <circle cx="50" cy="25" r="22" fill="#333"/>
    <circle cx="50" cy="25" r="14" fill="#555"/>
    <circle cx="50" cy="25" r="6" fill="#777"/>
    <circle cx="210" cy="25" r="22" fill="#333"/>
    <circle cx="210" cy="25" r="14" fill="#555"/>
    <circle cx="210" cy="25" r="6" fill="#777"/>
    <!-- Undercarriage -->
    <rect x="30" y="10" width="200" height="8" rx="4" fill="#1A5C1E"/>
  </g>

  <!-- Parcels on road (behind truck) -->
  <g transform="translate(120, 410)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#FFAA00" transform="rotate(-5)"/>
    <rect x="10" y="5" width="30" height="3" rx="1.5" fill="#E69900" transform="rotate(-5)"/>
    <rect x="20" y="0" width="4" height="40" rx="2" fill="#E69900" transform="rotate(-5)"/>
  </g>
  <g transform="translate(160, 420)">
    <rect x="0" y="0" width="40" height="32" rx="5" fill="#FFD786" transform="rotate(3)"/>
    <rect x="8" y="4" width="24" height="3" rx="1.5" fill="#FFAA00" transform="rotate(3)"/>
    <rect x="16" y="0" width="3" height="32" rx="1.5" fill="#FFAA00" transform="rotate(3)"/>
  </g>

  <!-- Location pins -->
  <g transform="translate(600, 180)">
    <circle cx="0" cy="0" r="40" fill="#FFAA00" opacity="0.2"/>
    <circle cx="0" cy="0" r="25" fill="#FFAA00" opacity="0.3"/>
    <path d="M0 -20 C-12 -20 -20 -12 -20 0 C-20 16 0 32 0 32 C0 32 20 16 20 0 C20 -12 12 -20 0 -20Z" fill="#237227"/>
    <circle cx="0" cy="-2" r="7" fill="white"/>
  </g>

  <g transform="translate(150, 250)">
    <circle cx="0" cy="0" r="28" fill="#237227" opacity="0.15"/>
    <path d="M0 -14 C-8 -14 -14 -8 -14 0 C-14 11 0 22 0 22 C0 22 14 11 14 0 C14 -8 8 -14 0 -14Z" fill="#519A66"/>
    <circle cx="0" cy="-2" r="5" fill="white"/>
  </g>

  <!-- Route dotted line -->
  <path d="M165 265 Q300 200 400 250 Q500 300 590 200" stroke="#237227" stroke-width="2.5" stroke-dasharray="8 6" fill="none" opacity="0.4"/>

  <!-- Speed lines behind truck -->
  <rect x="220" y="395" width="40" height="3" rx="1.5" fill="#237227" opacity="0.15"/>
  <rect x="200" y="410" width="55" height="3" rx="1.5" fill="#237227" opacity="0.1"/>
  <rect x="230" y="425" width="35" height="3" rx="1.5" fill="#237227" opacity="0.12"/>

  <!-- Floating checkmark badge -->
  <g transform="translate(680, 320)">
    <rect x="-40" y="-20" width="80" height="40" rx="20" fill="white" stroke="#D4ECD4" stroke-width="2"/>
    <circle cx="-15" cy="0" r="12" fill="#237227"/>
    <path d="M-20 0 L-15 5 L-8 -5" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="10" y="5" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#237227">Safe</text>
  </g>

  <!-- Clock/time badge -->
  <g transform="translate(100, 360)">
    <rect x="-35" y="-18" width="70" height="36" rx="18" fill="white" stroke="#FFD786" stroke-width="2"/>
    <circle cx="-12" cy="0" r="10" fill="#FFAA00"/>
    <path d="M-12 -5 L-12 1 L-8 3" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="10" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A0A0A">Fast</text>
  </g>
</svg>
