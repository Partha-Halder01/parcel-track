<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F7F0"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" rx="20" fill="url(#nbg)"/>

  <!-- Central hub -->
  <circle cx="300" cy="220" r="50" fill="#237227" opacity="0.1"/>
  <circle cx="300" cy="220" r="35" fill="#237227" opacity="0.15"/>
  <circle cx="300" cy="220" r="22" fill="#237227"/>
  <text x="300" y="226" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="white">NX</text>

  <!-- Connection lines -->
  <line x1="300" y1="220" x2="130" y2="120" stroke="#237227" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="300" y1="220" x2="480" y2="100" stroke="#237227" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="300" y1="220" x2="120" y2="340" stroke="#519A66" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="300" y1="220" x2="490" y2="320" stroke="#519A66" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="300" y1="220" x2="180" y2="230" stroke="#FFAA00" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>
  <line x1="300" y1="220" x2="440" y2="210" stroke="#FFAA00" stroke-width="2" stroke-dasharray="6 4" opacity="0.3"/>

  <!-- City nodes -->
  <!-- Delhi -->
  <g transform="translate(130, 120)">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#237227" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#237227"/>
    <rect x="-28" y="22" width="56" height="20" rx="10" fill="white" stroke="#D4ECD4" stroke-width="1"/>
    <text x="0" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#237227">Delhi</text>
  </g>

  <!-- Mumbai -->
  <g transform="translate(480, 100)">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#FFAA00" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#FFAA00"/>
    <rect x="-32" y="22" width="64" height="20" rx="10" fill="white" stroke="#FFD786" stroke-width="1"/>
    <text x="0" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#E69900">Mumbai</text>
  </g>

  <!-- Bangalore -->
  <g transform="translate(120, 340)">
    <circle cx="0" cy="0" r="16" fill="white" stroke="#519A66" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#519A66"/>
    <rect x="-35" y="20" width="70" height="20" rx="10" fill="white" stroke="#D4ECD4" stroke-width="1"/>
    <text x="0" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#519A66">Bangalore</text>
  </g>

  <!-- Chennai -->
  <g transform="translate(490, 320)">
    <circle cx="0" cy="0" r="16" fill="white" stroke="#519A66" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#519A66"/>
    <rect x="-30" y="20" width="60" height="20" rx="10" fill="white" stroke="#D4ECD4" stroke-width="1"/>
    <text x="0" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#519A66">Chennai</text>
  </g>

  <!-- Kolkata -->
  <g transform="translate(180, 230)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#237227" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#237227"/>
  </g>

  <!-- Hyderabad -->
  <g transform="translate(440, 210)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#FFAA00" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#FFAA00"/>
  </g>

  <!-- Animated parcel icons on routes -->
  <g transform="translate(210, 170)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#FFAA00"/>
    <rect x="-2" y="-8" width="4" height="16" rx="1" fill="#FFD786"/>
  </g>
  <g transform="translate(390, 160)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#237227"/>
    <rect x="-2" y="-8" width="4" height="16" rx="1" fill="#519A66"/>
  </g>
  <g transform="translate(210, 280)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#519A66"/>
    <rect x="-1" y="-6" width="3" height="12" rx="1" fill="#D4ECD4"/>
  </g>

  <!-- Stats bar at bottom -->
  <rect x="60" y="400" width="480" height="36" rx="18" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <g transform="translate(140, 418)">
    <circle cx="-8" cy="0" r="5" fill="#237227"/>
    <text x="6" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A0A0A">200+ Cities</text>
  </g>
  <g transform="translate(300, 418)">
    <circle cx="-8" cy="0" r="5" fill="#FFAA00"/>
    <text x="6" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A0A0A">50K+ Parcels</text>
  </g>
  <g transform="translate(460, 418)">
    <circle cx="-8" cy="0" r="5" fill="#519A66"/>
    <text x="6" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0A0A0A">99.9% Uptime</text>
  </g>
</svg>
