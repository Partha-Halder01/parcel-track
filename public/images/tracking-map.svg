<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F7F0"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <!-- Map background -->
  <rect width="600" height="500" rx="24" fill="url(#mapBg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#237227" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
  </g>

  <!-- Abstract land masses -->
  <path d="M50 200 Q100 150 180 180 Q250 200 280 160 Q320 120 380 150 Q420 170 400 220 Q380 280 300 270 Q220 260 180 300 Q120 280 80 240 Q50 220 50 200Z" fill="#237227" opacity="0.08"/>
  <path d="M350 280 Q400 250 460 270 Q520 290 540 340 Q550 390 500 400 Q440 410 400 380 Q360 350 350 310 Q340 290 350 280Z" fill="#519A66" opacity="0.06"/>
  <path d="M80 350 Q130 320 190 340 Q230 360 220 400 Q200 440 150 430 Q100 420 80 390 Q70 370 80 350Z" fill="#237227" opacity="0.06"/>

  <!-- Route path -->
  <path d="M120 380 C160 340 200 300 250 280 C300 260 320 240 350 200 C380 160 420 140 480 120" stroke="#237227" stroke-width="3" stroke-dasharray="12 8" fill="none" opacity="0.5"/>

  <!-- Animated route overlay (solid, shows progress) -->
  <path d="M120 380 C160 340 200 300 250 280 C300 260 320 240 350 200" stroke="#FFAA00" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Origin point -->
  <g transform="translate(120, 380)">
    <circle cx="0" cy="0" r="20" fill="#237227" opacity="0.15"/>
    <circle cx="0" cy="0" r="12" fill="#237227"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
  </g>

  <!-- Midpoint (current location) -->
  <g transform="translate(350, 200)">
    <circle cx="0" cy="0" r="28" fill="#FFAA00" opacity="0.2"/>
    <circle cx="0" cy="0" r="18" fill="#FFAA00" opacity="0.3"/>
    <path d="M0 -18 C-10 -18 -18 -10 -18 0 C-18 14 0 28 0 28 C0 28 18 14 18 0 C18 -10 10 -18 0 -18Z" fill="#FFAA00"/>
    <circle cx="0" cy="-2" r="6" fill="white"/>
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="28" stroke="#FFAA00" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Destination -->
  <g transform="translate(480, 120)">
    <circle cx="0" cy="0" r="16" fill="#519A66" opacity="0.2"/>
    <circle cx="0" cy="0" r="10" fill="#519A66" opacity="0.4"/>
    <rect x="-6" y="-6" width="12" height="12" rx="3" fill="none" stroke="#519A66" stroke-width="2" stroke-dasharray="4 3"/>
  </g>

  <!-- Info cards -->
  <!-- Origin label -->
  <g transform="translate(120, 420)">
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="white" stroke="#D4ECD4" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#237227">Delhi</text>
  </g>

  <!-- Current label -->
  <g transform="translate(350, 245)">
    <rect x="-55" y="-14" width="110" height="28" rx="14" fill="#FFAA00" />
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#0A0A0A">In Transit</text>
  </g>

  <!-- Destination label -->
  <g transform="translate(480, 152)">
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="white" stroke="#D4ECD4" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#519A66">Mumbai</text>
  </g>

  <!-- Distance badge -->
  <g transform="translate(300, 80)">
    <rect x="-65" y="-18" width="130" height="36" rx="18" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0A0A0A">1,400 km | 2 days</text>
  </g>
</svg>
