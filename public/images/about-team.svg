<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F7F0"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" rx="20" fill="url(#abg)"/>

  <!-- Desk -->
  <rect x="100" y="260" width="400" height="12" rx="6" fill="#237227" opacity="0.15"/>

  <!-- Monitor 1 -->
  <g transform="translate(180, 140)">
    <rect x="0" y="0" width="120" height="85" rx="8" fill="#0A0A0A"/>
    <rect x="6" y="6" width="108" height="68" rx="4" fill="#1A1A1A"/>
    <!-- Screen content -->
    <rect x="14" y="14" width="40" height="4" rx="2" fill="#237227"/>
    <rect x="14" y="24" width="90" height="3" rx="1.5" fill="#333"/>
    <rect x="14" y="32" width="70" height="3" rx="1.5" fill="#333"/>
    <rect x="14" y="40" width="80" height="3" rx="1.5" fill="#333"/>
    <rect x="14" y="52" width="90" height="16" rx="4" fill="#237227" opacity="0.3"/>
    <rect x="20" y="56" width="30" height="3" rx="1.5" fill="#237227"/>
    <rect x="55" y="56" width="20" height="3" rx="1.5" fill="#FFAA00"/>
    <!-- Stand -->
    <rect x="48" y="85" width="24" height="20" rx="2" fill="#0A0A0A"/>
    <rect x="35" y="100" width="50" height="6" rx="3" fill="#0A0A0A"/>
  </g>

  <!-- Monitor 2 -->
  <g transform="translate(340, 150)">
    <rect x="0" y="0" width="100" height="72" rx="7" fill="#0A0A0A"/>
    <rect x="5" y="5" width="90" height="58" rx="3" fill="#1A1A1A"/>
    <!-- Map on screen -->
    <circle cx="35" cy="25" r="4" fill="#237227" opacity="0.5"/>
    <circle cx="60" cy="35" r="3" fill="#FFAA00" opacity="0.5"/>
    <path d="M35 25 Q48 20 60 35" stroke="#519A66" stroke-width="1.5" stroke-dasharray="3 2" fill="none" opacity="0.5"/>
    <rect x="12" y="45" width="70" height="3" rx="1.5" fill="#333"/>
    <rect x="12" y="52" width="50" height="3" rx="1.5" fill="#333"/>
    <!-- Stand -->
    <rect x="40" y="72" width="20" height="18" rx="2" fill="#0A0A0A"/>
    <rect x="30" y="86" width="40" height="5" rx="2.5" fill="#0A0A0A"/>
  </g>

  <!-- Person 1 -->
  <g transform="translate(230, 95)">
    <circle cx="0" cy="0" r="22" fill="#FFD786"/>
    <circle cx="0" cy="-2" r="18" fill="#FFAA00" opacity="0.3"/>
    <!-- Hair -->
    <path d="M-16 -8 Q-18 -22 0 -24 Q18 -22 16 -8" fill="#333"/>
    <!-- Body -->
    <path d="M-20 25 Q-22 40 -18 60 L18 60 Q22 40 20 25 Q10 20 0 22 Q-10 20 -20 25Z" fill="#237227"/>
  </g>

  <!-- Person 2 -->
  <g transform="translate(380, 105)">
    <circle cx="0" cy="0" r="20" fill="#FFD786"/>
    <circle cx="0" cy="-2" r="16" fill="#FFAA00" opacity="0.3"/>
    <!-- Hair -->
    <path d="M-14 -6 Q-16 -22 0 -24 Q12 -22 14 -14 L16 -6 Q8 -10 0 -8 Q-8 -10 -14 -6Z" fill="#1A1A1A"/>
    <!-- Body -->
    <path d="M-18 22 Q-20 38 -16 55 L16 55 Q20 38 18 22 Q9 18 0 20 Q-9 18 -18 22Z" fill="#519A66"/>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(460, 240)">
    <rect x="0" y="0" width="18" height="22" rx="3" fill="#FFD786"/>
    <path d="M18 5 Q28 5 28 12 Q28 18 18 18" stroke="#FFD786" stroke-width="3" fill="none"/>
    <rect x="3" y="-4" width="12" height="3" rx="1.5" fill="#FFAA00" opacity="0.4"/>
  </g>

  <!-- Plant -->
  <g transform="translate(130, 200)">
    <rect x="0" y="30" width="24" height="30" rx="4" fill="#FFD786"/>
    <path d="M12 30 Q5 15 12 5 Q19 15 12 30Z" fill="#237227"/>
    <path d="M12 25 Q0 18 -5 8" stroke="#519A66" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M12 25 Q24 18 29 10" stroke="#519A66" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="-5" cy="6" r="6" fill="#519A66" opacity="0.6"/>
    <circle cx="29" cy="8" r="5" fill="#237227" opacity="0.5"/>
  </g>

  <!-- Floating elements -->
  <g transform="translate(500, 80)">
    <rect x="-20" y="-12" width="40" height="24" rx="12" fill="#FFAA00" opacity="0.2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">&#128230;</text>
  </g>
  <g transform="translate(80, 100)">
    <rect x="-18" y="-12" width="36" height="24" rx="12" fill="#237227" opacity="0.1"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">&#128205;</text>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="100" y="320" width="400" height="50" rx="10" fill="white" opacity="0.5"/>
  <g transform="translate(120, 335)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#237227" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#237227">50K+</text>
  </g>
  <g transform="translate(200, 335)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#FFAA00" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#E69900">98%</text>
  </g>
  <g transform="translate(280, 335)">
    <rect x="0" y="0" width="70" height="20" rx="10" fill="#519A66" opacity="0.15"/>
    <text x="35" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#519A66">200+ cities</text>
  </g>
</svg>
